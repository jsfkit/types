name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Publish to npm
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -([a-zA-Z]+) ]]; then
            DIST_TAG="${BASH_REMATCH[1]}"
            npm publish --access public --tag "$DIST_TAG"
          else
            npm publish --access public
          fi
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: publish
    steps:
      - uses: actions/checkout@v5
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
